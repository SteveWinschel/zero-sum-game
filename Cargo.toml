[package]
name = "zero-sum-game"
version = "0.1.0"
edition = "2024"

[dependencies]
bevy = "0.16.0"
rand = "0.9.1"
uuid = "1.16.0"

[profile.dev]
opt-level = 1      # Speeds up compilation while keeping debug assertions
codegen-units = 16 # Number of my physical CPU cores

[profile.dev.package."*"]
opt-level = 3 # To compile dependencies with all highest optimizations

[profile.release]
opt-level = 3
codegen-units = 1
strip = "debuginfo"

[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-Clink-arg=-fuse-ld=lld"]
